<!doctype html>
<html lang="fr-CA">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebForge Palier 1 — Canvas (états & variantes)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="webforge/styles.css" />

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #E9E6DF; }
    #app { width: 100%; height: 100vh; }

    /* Brand bar (same as prototype) */
    .wf-brand-bar {
      position: fixed; top: 0; left: 0; right: 0;
      height: 36px; background: #1A1A1A; color: #FAFAF7;
      display: flex; align-items: center; padding: 0 16px;
      font-family: "Archivo", system-ui, sans-serif;
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      gap: 16px; z-index: 200; border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .wf-brand-bar strong { color: #C8451F; letter-spacing: 0.08em; }
    .wf-brand-bar .sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }
    .wf-brand-bar a {
      color: rgba(250,249,247,0.7); text-decoration: none;
      letter-spacing: 0.06em; transition: color 120ms; font-size: 10.5px;
    }
    .wf-brand-bar a:hover { color: #FAFAF7; }
    .wf-brand-bar .spacer { flex: 1; }

    .canvas-host { position: absolute; inset: 36px 0 0 0; }

    /* Helpers for state cards */
    .cnv-card {
      width: 100%; height: 100%;
      background: var(--bg-base);
      overflow: hidden;
    }
    .cnv-dark { background: var(--accent-2); padding: 32px; }
    .cnv-pad  { padding: 24px; }

    /* Force show button hover/focus/active without real cursor */
    .demo-hover .wf-btn { background: var(--accent-1); border-color: var(--accent-1); }
    .demo-hover .wf-btn .wf-btn-arrow { transform: translateX(3px); }
    .demo-focus .wf-btn {
      outline: 2px solid var(--accent-1);
      outline-offset: 3px;
    }
    .demo-active .wf-btn { transform: translateY(1px); }
    .demo-input-focus .wf-input-demo {
      border-color: var(--accent-1) !important;
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--accent-1) 18%, transparent);
    }

    /* Button row demo */
    .btn-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      align-items: end;
    }
    .btn-cell {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px;
      background: var(--bg-base);
      border: 1px solid color-mix(in oklch, var(--text-base) 8%, transparent);
    }
    .btn-cell-label {
      font-family: "JetBrains Mono", monospace;
      font-size: 10.5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    .header-shell {
      width: 100%; background: var(--bg-base);
      padding: 16px 0;
      border-bottom: 1px solid transparent;
    }
    .header-shell.is-scrolled {
      background: color-mix(in oklch, var(--bg-base) 92%, transparent);
      border-bottom: 1px solid color-mix(in oklch, var(--text-base) 12%, transparent);
      box-shadow: 0 1px 0 rgba(255,255,255,0.5) inset;
    }

    /* Field demo */
    .field-demo {
      display: flex; flex-direction: column; gap: 8px;
      max-width: 360px;
    }
    .field-demo label {
      font-family: var(--font-display); font-size: 13px; font-weight: 500;
    }
    .wf-input-demo {
      padding: 14px 16px;
      background: var(--bg-base);
      color: var(--text-base);
      border: 1px solid color-mix(in oklch, var(--text-base) 18%, transparent);
      border-radius: var(--radius);
      font: 15px/1.4 var(--font-body);
      width: 100%;
    }
    .wf-input-demo[data-state="hover"] { border-color: color-mix(in oklch, var(--text-base) 35%, transparent); }
    .wf-input-demo[data-state="error"] {
      border-color: var(--accent-1);
      background: color-mix(in oklch, var(--accent-1) 6%, var(--bg-base));
    }
    .wf-input-demo[data-state="filled"] { color: var(--text-base); }

    /* Mini section labels inside artboards */
    .cnv-block-title {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 12px;
    }
    .cnv-divider {
      height: 1px;
      background: color-mix(in oklch, var(--text-base) 10%, transparent);
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <div class="wf-brand-bar">
    <strong>WebForge</strong>
    <span>Palier 1 · Canvas</span>
    <span class="sep"></span>
    <span>États · variantes · pages légales</span>
    <span class="spacer"></span>
    <a href="WebForge Palier 1.html">← Voir le prototype interactif</a>
  </div>

  <div class="canvas-host" id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="webforge/design-canvas.jsx"></script>
  <script type="text/babel" src="webforge/sections.jsx"></script>
  <script type="text/babel" src="webforge/legal.jsx"></script>

  <script type="text/babel">
    // ──────────────────────────────────────────────────────────────────
    // Helper: standalone block, wrapped in a static-mode site host so
    // container queries fire correctly at the artboard's width.
    // ──────────────────────────────────────────────────────────────────
    function HostBlock({ children, device = "desktop" }) {
      return <div className={`wf-site wf-device-${device} is-static`}>{children}</div>;
    }

    function FullSite({ device = "desktop", forceScrolled = false, forcedFormState }) {
      return <Site device={device} mode="static" forceScrolled={forceScrolled} forcedFormState={forcedFormState} />;
    }

    // ──────────────────────────────────────────────────────────────────
    // Button states (5 cells side by side)
    // ──────────────────────────────────────────────────────────────────
    function ButtonStates() {
      const cells = [
        { label: "Default", cls: "" },
        { label: "Hover",   cls: "demo-hover" },
        { label: "Focus",   cls: "demo-focus" },
        { label: "Active",  cls: "demo-active" },
        { label: "Disabled", cls: "demo-disabled" },
      ];
      return (
        <HostBlock>
          <div className="cnv-pad" style={{ background: "var(--bg-base)", height: "100%" }}>
            <p className="cnv-block-title">Bouton primaire — états interactifs</p>
            <div className="btn-row">
              {cells.map((c) => (
                <div key={c.label} className={`btn-cell ${c.cls}`}>
                  <span className="btn-cell-label">{c.label}</span>
                  {c.label === "Disabled"
                    ? <button className="wf-btn" disabled>Envoyer la demande</button>
                    : <a className="wf-btn" href="#" onClick={(e) => e.preventDefault()}>
                        Envoyer la demande
                        <span className="wf-btn-arrow" aria-hidden="true">→</span>
                      </a>}
                </div>
              ))}
            </div>

            <div className="cnv-divider" />

            <p className="cnv-block-title">Bouton fantôme</p>
            <div className="btn-row">
              {cells.map((c) => (
                <div key={c.label} className={`btn-cell ${c.cls}`}>
                  <span className="btn-cell-label">{c.label}</span>
                  <a className="wf-btn-ghost" href="#" onClick={(e) => e.preventDefault()}>Voir les services</a>
                </div>
              ))}
            </div>
          </div>
        </HostBlock>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // Input field states
    // ──────────────────────────────────────────────────────────────────
    function FieldStates() {
      return (
        <HostBlock>
          <div className="cnv-pad" style={{ background: "var(--bg-base)", height: "100%" }}>
            <p className="cnv-block-title">Champ texte — états</p>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24 }}>
              <div className="field-demo">
                <label>Default</label>
                <input className="wf-input-demo" placeholder="Catherine Dufresne" defaultValue="" />
              </div>
              <div className="field-demo">
                <label>Hover</label>
                <input className="wf-input-demo" data-state="hover" placeholder="Catherine Dufresne" defaultValue="" />
              </div>
              <div className="field-demo">
                <label>Focus</label>
                <input className="wf-input-demo" placeholder="Catherine Dufresne" defaultValue=""
                       style={{ borderColor: "var(--accent-1)", boxShadow: "0 0 0 3px color-mix(in oklch, var(--accent-1) 18%, transparent)" }} />
              </div>
              <div className="field-demo">
                <label>Filled</label>
                <input className="wf-input-demo" data-state="filled" defaultValue="Catherine Dufresne" />
              </div>
              <div className="field-demo">
                <label>Error</label>
                <input className="wf-input-demo" data-state="error" defaultValue="catherine@" aria-invalid="true" />
                <p className="wf-err" style={{ margin: 0 }}>Courriel invalide.</p>
              </div>
              <div className="field-demo">
                <label>Disabled</label>
                <input className="wf-input-demo" defaultValue="" disabled
                       style={{ background: "var(--bg-alt)", color: "var(--text-muted)", opacity: 0.6 }} />
              </div>
            </div>
          </div>
        </HostBlock>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // Header states (default vs scrolled)
    // ──────────────────────────────────────────────────────────────────
    function HeaderState({ scrolled }) {
      return (
        <HostBlock>
          <div style={{ background: "var(--bg-base)", height: "100%", paddingBottom: 80 }}>
            <Header scrolled={scrolled} onAnchor={() => {}} />
            <div style={{ padding: "48px 64px", color: "var(--text-muted)", fontFamily: "var(--font-display)", fontSize: 13, letterSpacing: 0.02 }}>
              <span style={{
                display: "inline-block", padding: "4px 8px",
                background: "color-mix(in oklch, var(--text-base) 6%, transparent)",
                borderRadius: 2, fontSize: 11, letterSpacing: 0.08, textTransform: "uppercase",
                marginBottom: 12, color: "var(--text-muted)"
              }}>
                {scrolled ? "Header scrolled — hairline + backdrop blur" : "Header au repos — transparent / blurry"}
              </span>
              <p style={{ maxWidth: 64+"ch", margin: 0, lineHeight: 1.6 }}>
                Position sticky avec backdrop-filter. La hairline et le fond apparaissent uniquement après 24px de scroll, pour ne pas alourdir le hero.
              </p>
            </div>
          </div>
        </HostBlock>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // FAQ interactive (full standalone)
    // ──────────────────────────────────────────────────────────────────
    function FAQDemo() {
      return (
        <HostBlock>
          <div style={{ background: "var(--bg-base)", height: "100%", padding: "48px 56px", overflow: "hidden" }}>
            <p className="cnv-block-title">FAQ — accordéon (cliquable)</p>
            <FAQ />
          </div>
        </HostBlock>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // Form-state cell (form on accent-2 dark backdrop, like real placement)
    // ──────────────────────────────────────────────────────────────────
    function FormStateCard({ state, label }) {
      return (
        <HostBlock>
          <div style={{
            background: "var(--accent-2)",
            height: "100%",
            padding: 32,
            display: "flex", flexDirection: "column", gap: 16,
          }}>
            <div style={{
              fontFamily: "var(--font-display)",
              fontSize: 11, letterSpacing: 0.12, textTransform: "uppercase",
              color: "color-mix(in oklch, var(--bg-base) 55%, transparent)",
              display: "flex", justifyContent: "space-between",
            }}>
              <span>État · {label}</span>
              <span>forcedState="{state || "idle"}"</span>
            </div>
            <ContactForm forcedState={state} />
          </div>
        </HostBlock>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // Service card variants (3 layout options for future tweaks)
    // ──────────────────────────────────────────────────────────────────
    function ServicesPreview() {
      return (
        <HostBlock>
          <div style={{ background: "var(--bg-base)", height: "100%" }}>
            <Services />
          </div>
        </HostBlock>
      );
    }

    function TestimonialsPreview() {
      return (
        <HostBlock>
          <div style={{ height: "100%" }}>
            <Testimonials />
          </div>
        </HostBlock>
      );
    }

    function AboutPreview() {
      return (
        <HostBlock>
          <About />
        </HostBlock>
      );
    }

    function HeroPreview() {
      return (
        <HostBlock>
          <Header scrolled={false} onAnchor={() => {}} />
          <Hero onAnchor={() => {}} />
        </HostBlock>
      );
    }

    function FooterPreview() {
      return (
        <HostBlock>
          <Footer />
        </HostBlock>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // CANVAS
    // ──────────────────────────────────────────────────────────────────
    function App() {
      // Set tokens once on the canvas root (no Tweaks here)
      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty("--accent-1", "#C8451F");
        root.style.setProperty("--font-display", '"Archivo", "Helvetica Neue", sans-serif');
        root.style.setProperty("--font-body",    '"Archivo", "Helvetica Neue", sans-serif');
      }, []);

      return (
        <DesignCanvas>
          <DCSection id="overview" title="Vue d'ensemble" subtitle="Site complet · Atelier Cormier · mobile-first responsive">
            <DCArtboard id="full-mobile" label="Mobile · 390px · site complet" width={390} height={7200}>
              <FullSite device="mobile" />
            </DCArtboard>
            <DCArtboard id="full-desktop" label="Desktop · 1280px · site complet" width={1280} height={5200}>
              <FullSite device="desktop" />
            </DCArtboard>
          </DCSection>

          <DCSection id="blocks" title="Six blocs noyau" subtitle="Chaque bloc, sortable et réutilisable en composant Nuxt indépendant">
            <DCArtboard id="b-hero" label="01 · Hero" width={1280} height={820}>
              <HeroPreview />
            </DCArtboard>
            <DCArtboard id="b-about" label="02 · À propos" width={1280} height={860}>
              <AboutPreview />
            </DCArtboard>
            <DCArtboard id="b-services" label="03 · Services" width={1280} height={780}>
              <ServicesPreview />
            </DCArtboard>
            <DCArtboard id="b-testimonials" label="04 · Témoignages" width={1280} height={720}>
              <TestimonialsPreview />
            </DCArtboard>
            <DCArtboard id="b-faq" label="05 · FAQ · accordéon vivant" width={1280} height={780}>
              <FAQDemo />
            </DCArtboard>
            <DCArtboard id="b-footer" label="Footer + Crédit Patoine" width={1280} height={380}>
              <FooterPreview />
            </DCArtboard>
          </DCSection>

          <DCSection id="form-states" title="Formulaire de contact · états" subtitle="Vide / validation / envoi / succès / erreur — vrais composants, vrais styles">
            <DCArtboard id="fs-empty" label="Vide" width={540} height={680}>
              <FormStateCard state={undefined} label="Vide" />
            </DCArtboard>
            <DCArtboard id="fs-invalid" label="Validation côté client" width={540} height={780}>
              <FormStateCard state="invalid" label="Validation" />
            </DCArtboard>
            <DCArtboard id="fs-loading" label="Envoi en cours" width={540} height={700}>
              <FormStateCard state="loading" label="Loading" />
            </DCArtboard>
            <DCArtboard id="fs-success" label="Confirmation post-soumission" width={540} height={520}>
              <FormStateCard state="success" label="Succès" />
            </DCArtboard>
            <DCArtboard id="fs-error" label="Erreur réseau" width={540} height={720}>
              <FormStateCard state="error" label="Erreur d'envoi" />
            </DCArtboard>
          </DCSection>

          <DCSection id="micro" title="Composants &amp; micro-états" subtitle="Boutons, champs, header — bases d'interaction discipline tokens">
            <DCArtboard id="m-buttons" label="Boutons" width={1280} height={520}>
              <ButtonStates />
            </DCArtboard>
            <DCArtboard id="m-fields" label="Champs de formulaire" width={1000} height={460}>
              <FieldStates />
            </DCArtboard>
            <DCArtboard id="m-header-rest" label="Header · au repos" width={1280} height={240}>
              <HeaderState scrolled={false} />
            </DCArtboard>
            <DCArtboard id="m-header-scrolled" label="Header · scrolled" width={1280} height={240}>
              <HeaderState scrolled={true} />
            </DCArtboard>
          </DCSection>

          <DCSection id="legal" title="Pages légales" subtitle="Conditions d'utilisation &amp; Politique de confidentialité · gabarit sobre, hors carte tokens principale">
            <DCArtboard id="legal-conditions" label="Conditions d'utilisation" width={1280} height={1750}>
              <LegalPage kind="conditions" />
            </DCArtboard>
            <DCArtboard id="legal-privacy" label="Politique de confidentialité" width={1280} height={1750}>
              <LegalPage kind="privacy" />
            </DCArtboard>
          </DCSection>

          <DCSection id="tokens" title="Design tokens" subtitle="Tout dérive d'ici · 8 variables racines + 2 dérivées · prêt pour extraction npm">
            <DCArtboard id="tokens-card" label="Tokens racines" width={780} height={620}>
              <TokensCard />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    // ──────────────────────────────────────────────────────────────────
    // Tokens reference card
    // ──────────────────────────────────────────────────────────────────
    function TokensCard() {
      const rows = [
        { group: "Surfaces", items: [
          ["--bg-base", "#FAFAF7", "Surface principale, fond du site"],
          ["--bg-alt",  "#F2EFE9", "Surface alternée, cartes témoignages"],
        ]},
        { group: "Typo couleur", items: [
          ["--text-base",  "#1A1A1A", "Texte courant, titres"],
          ["--text-muted", "#6B675F", "Texte secondaire, captions"],
        ]},
        { group: "Accents", items: [
          ["--accent-1", "#C8451F", "Terracotta · CTA, eyebrows, focus"],
          ["--accent-2", "#1A1A1A", "Contraste fort · boutons, contact"],
        ]},
        { group: "Géométrie", items: [
          ["--radius",        "2px", "Coins, boutons, champs"],
          ["--spacing-unit",  "8px", "Tous les espacements en multiples"],
        ]},
        { group: "Typo familles", items: [
          ["--font-display", "Archivo", "Titres, eyebrows, nav"],
          ["--font-body",    "Archivo", "Corps de texte, paragraphes"],
        ]},
      ];
      return (
        <HostBlock>
          <div style={{ padding: "40px 48px", background: "var(--bg-base)", height: "100%", overflow: "hidden" }}>
            <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", columnGap: 24, rowGap: 4 }}>
              <div style={{ gridColumn: "1 / -1", display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 20 }}>
                <div>
                  <div className="wf-eyebrow">Design tokens</div>
                  <h2 className="wf-h2" style={{ margin: 0 }}>10 variables, point.</h2>
                </div>
                <span style={{ fontFamily: "JetBrains Mono, monospace", fontSize: 12, color: "var(--text-muted)" }}>:root</span>
              </div>
              {rows.map((r) => (
                <React.Fragment key={r.group}>
                  <div style={{
                    gridColumn: "1 / -1",
                    fontFamily: "var(--font-display)", fontSize: 11,
                    letterSpacing: 0.12, textTransform: "uppercase",
                    color: "var(--accent-1)", marginTop: 16, fontWeight: 600,
                    paddingTop: 12, borderTop: "1px solid color-mix(in oklch, var(--text-base) 10%, transparent)",
                  }}>
                    {r.group}
                  </div>
                  {r.items.map(([name, val, desc]) => (
                    <React.Fragment key={name}>
                      <div style={{
                        fontFamily: "JetBrains Mono, monospace", fontSize: 13,
                        padding: "8px 0", color: "var(--text-base)",
                      }}>{name}</div>
                      <div style={{
                        padding: "8px 0", display: "flex", alignItems: "center", gap: 12,
                        fontFamily: "JetBrains Mono, monospace", fontSize: 13, color: "var(--text-muted)",
                      }}>
                        {name.startsWith("--bg") || name.startsWith("--text") || name.startsWith("--accent")
                          ? <span style={{ width: 16, height: 16, background: val, border: "1px solid color-mix(in oklch, #1A1A1A 12%, transparent)", borderRadius: 2 }} />
                          : null}
                        <span style={{ color: "var(--text-base)" }}>{val}</span>
                        <span style={{ color: "var(--text-muted)" }}>· {desc}</span>
                      </div>
                    </React.Fragment>
                  ))}
                </React.Fragment>
              ))}
            </div>
          </div>
        </HostBlock>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(<App />);
  </script>
</body>
</html>
