<!doctype html>
<html lang="fr-CA">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WebForge Palier 1 — Atelier Cormier</title>
  <meta name="description" content="Maquette Palier 1 du gabarit WebForge — Atelier Cormier, ébénisterie sur mesure à Chambly." />

  <!-- Font candidates (all three pairings preloaded so Tweak swaps are instant) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="webforge/styles.css" />

  <style>
    /* Page chrome (sits outside the .wf-site container) */
    html, body { height: 100%; background: #E9E6DF; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui;
      display: grid;
      place-items: stretch;
    }
    #app { width: 100%; height: 100vh; }

    .wf-stage {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: stretch;
      justify-content: center;
      background:
        radial-gradient(circle at 20% 10%, rgba(200,69,31,0.04), transparent 50%),
        #E9E6DF;
      overflow: hidden;
      position: relative;
    }
    .wf-stage-inner {
      width: 100%;
      height: 100%;
      background: var(--bg-base);
      overflow: hidden;
      position: relative;
    }
    .wf-stage.is-mobile { padding: 24px 0; }
    .wf-stage.is-mobile .wf-stage-inner {
      width: 390px;
      height: calc(100% - 48px);
      border-radius: 18px;
      border: 1px solid color-mix(in oklch, #1A1A1A 14%, transparent);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 24px 60px -20px rgba(0,0,0,0.25);
    }
    .wf-mobile-notch {
      position: absolute;
      top: 8px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 26px;
      background: #0a0a0a;
      border-radius: 0 0 14px 14px;
      z-index: 100;
      pointer-events: none;
      display: none;
    }
    .wf-stage.is-mobile .wf-mobile-notch { display: block; }

    /* Smallest device-mode helper: brand bar above the canvas */
    .wf-brand-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 36px;
      background: #1A1A1A;
      color: #FAFAF7;
      display: flex;
      align-items: center;
      padding: 0 16px;
      font-family: "Archivo", system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      gap: 16px;
      z-index: 200;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .wf-brand-bar strong { color: var(--accent-1, #C8451F); letter-spacing: 0.08em; }
    .wf-brand-bar .sep { width: 1px; height: 14px; background: rgba(255,255,255,0.2); }
    .wf-brand-bar a {
      color: rgba(250,249,247,0.7);
      text-decoration: none;
      letter-spacing: 0.06em;
      transition: color 120ms;
      font-size: 10.5px;
    }
    .wf-brand-bar a:hover { color: #FAFAF7; }
    .wf-brand-bar .spacer { flex: 1; }
    .wf-stage { padding-top: 36px; }
    .wf-stage.is-mobile { padding-top: 60px; }
  </style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#FAFAF7">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#FAFAF7"/>
      <g transform="translate(420 240)">
        <rect x="0" y="0" width="360" height="360" rx="6" fill="#2D4A3E"/>
        <text x="180" y="200" text-anchor="middle" font-family="Archivo, Helvetica, Arial, sans-serif"
              font-size="170" font-weight="700" fill="#FAFAF7" letter-spacing="-6">AC</text>
      </g>
      <text x="600" y="680" text-anchor="middle" font-family="Archivo, Helvetica, Arial, sans-serif"
            font-size="26" font-weight="500" fill="#1A1A1A" letter-spacing="6">ATELIER · CORMIER</text>
      <text x="600" y="720" text-anchor="middle" font-family="Archivo, Helvetica, Arial, sans-serif"
            font-size="14" font-weight="400" fill="#6B675F" letter-spacing="4">WEBFORGE · PALIER 1</text>
    </svg>
  </template>

  <div class="wf-brand-bar">
    <strong>WebForge</strong>
    <span>Palier 1 · One-pager</span>
    <span class="sep"></span>
    <span>Démo · Atelier Cormier</span>
    <span class="spacer"></span>
    <a href="WebForge Canvas.html">Voir le canvas (états &amp; variantes) →</a>
  </div>

  <div id="app"></div>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Tweaks panel + Sections -->
  <script type="text/babel" src="webforge/tweaks-panel.jsx"></script>
  <script type="text/babel" src="webforge/sections.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accent": "#2D4A3E",
      "typePair": "archivo",
      "device": "desktop"
    }/*EDITMODE-END*/;

    const ACCENT_OPTIONS = [
      "#C8451F",  // terracotta (default)
      "#8A6E3E",  // ochre / olive
      "#2D4A3E",  // forêt
      "#1A1A1A"   // monochrome (accent = noir)
    ];

    const TYPE_PAIRS = {
      archivo: {
        label: "Archivo",
        sub: "Suisse neutre · sans-serif unique",
        display: "\"Archivo\", \"Helvetica Neue\", Helvetica, Arial, sans-serif",
        body:    "\"Archivo\", \"Helvetica Neue\", Helvetica, Arial, sans-serif",
      },
      grotesk: {
        label: "Space · DM Sans",
        sub: "Géométrique + humaniste",
        display: "\"Space Grotesk\", \"Helvetica Neue\", sans-serif",
        body:    "\"DM Sans\", \"Helvetica Neue\", sans-serif",
      },
      editorial: {
        label: "Instrument · Geist",
        sub: "Serif éditorial + sans moderne",
        display: "\"Instrument Serif\", \"Times New Roman\", serif",
        body:    "\"Geist\", \"Helvetica Neue\", sans-serif",
      },
    };

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty("--accent-1", t.accent);
        const pair = TYPE_PAIRS[t.typePair] || TYPE_PAIRS.archivo;
        root.style.setProperty("--font-display", pair.display);
        root.style.setProperty("--font-body", pair.body);
      }, [t.accent, t.typePair]);

      return (
        <>
          <div className={`wf-stage ${t.device === "mobile" ? "is-mobile" : ""}`}>
            <div className="wf-mobile-notch" aria-hidden="true" />
            <div className="wf-stage-inner">
              <Site device={t.device} />
            </div>
          </div>

          <TweaksPanel title="Tweaks · WebForge">
            <TweakSection label="Aperçu" />
            <TweakRadio
              label="Appareil"
              value={t.device}
              options={["desktop", "mobile"]}
              onChange={(v) => setTweak("device", v)}
            />

            <TweakSection label="Couleur d'accent" />
            <TweakColor
              label="--accent-1"
              value={t.accent}
              options={ACCENT_OPTIONS}
              onChange={(v) => setTweak("accent", v)}
            />

            <TweakSection label="Pairing typographique" />
            <TweakSelect
              label="--font-display / --font-body"
              value={t.typePair}
              options={Object.keys(TYPE_PAIRS).map(k => ({ value: k, label: TYPE_PAIRS[k].label + " · " + TYPE_PAIRS[k].sub }))}
              onChange={(v) => setTweak("typePair", v)}
            />

            <TweakSection label="Tokens actifs" />
            <div style={{ fontFamily: "ui-monospace, monospace", fontSize: 10.5, lineHeight: 1.7, color: "rgba(41,38,27,.75)" }}>
              <div>--bg-base · #FAFAF7</div>
              <div>--bg-alt · #F2EFE9</div>
              <div>--text-base · #1A1A1A</div>
              <div>--text-muted · #6B675F</div>
              <div>--accent-1 · {t.accent}</div>
              <div>--accent-2 · #1A1A1A</div>
              <div>--radius · 2px</div>
              <div>--spacing-unit · 8px</div>
            </div>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(<App />);
  </script>
</body>
</html>
